version: "3.8"

services:
  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.1
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: verification
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/videos &&
      echo 'Bucket created successfully'
      "

  # --- Product Pipeline ---

  submitter:
    build:
      context: ..
      dockerfile: services/submitter/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/verification
      WEBHOOK_BASE_URL: http://gateway:8001
      HTTP_PORT: "8000"
    ports:
      - "8000:8000"

  gateway:
    build:
      context: ..
      dockerfile: services/gateway/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/verification
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      HTTP_PORT: "8001"
    ports:
      - "8001:8001"

  downloader:
    build:
      context: ..
      dockerfile: services/downloader/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/verification
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      KAFKA_TOPIC: video.download.ready.v1
      KAFKA_GROUP_ID: downloader-service
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: videos
      VIDEO_BASE_DIR: /data/videos
    volumes:
      - video-data:/data/videos

  completion-handler:
    build:
      context: ..
      dockerfile: services/completion_handler/Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/verification
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      KAFKA_TOPIC: video.verification.completed.v1
      KAFKA_GROUP_ID: completion-handler-service

  # --- Existing Pipeline ---

  preprocessor:
    build:
      context: ..
      dockerfile: services/preprocessor/Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      KAFKA_TOPIC: video.verification.requested.v1
      KAFKA_GROUP_ID: preprocessor-service
      FRAMES_BASE_DIR: /data/frames
      FRAME_SAMPLING_FPS: "1.0"
      FRAME_SAMPLING_MAX_FRAMES: "16"
      MAX_VIDEO_SECONDS: "300"
    volumes:
      - frames-data:/data/frames
      - video-data:/data/videos:ro
      - ../test_resources/images:/data/images:ro

  analyzer:
    build:
      context: ..
      dockerfile: services/analyzer/Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
    env_file:
      - ../.env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      KAFKA_TOPIC: video.frames.extracted.v1
      KAFKA_GROUP_ID: analyzer-service
      MODEL_DEFAULT: gemini
    volumes:
      - frames-data:/data/frames
      - ../test_resources/images:/data/images:ro

  scorer:
    build:
      context: ..
      dockerfile: services/scorer/Dockerfile
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: redpanda:29092
      KAFKA_TOPIC: video.analysis.completed.v1
      KAFKA_GROUP_ID: scorer-service
      OUTPUT_DIR: /data/output
    volumes:
      - ../output:/data/output

volumes:
  frames-data:
  video-data:
  postgres-data:
  minio-data:
